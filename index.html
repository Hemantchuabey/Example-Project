<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Home Page</title>
    <style>
      /* Basic Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Hero Section Styling */
      .hero {
        height: 100vh;
        width: 100%;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        padding: 0 20px;
      }

      .hero-content h1 {
        font-size: 3.5rem;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }

      .hero-content p {
        font-size: 1.2rem;
        margin-bottom: 30px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6;
      }

      /* Buttons */
      .cta-buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      .btn {
        padding: 12px 30px;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s ease;
      }

      .btn-primary {
        background-color: #007bff;
        color: white;
      }

      .btn-primary:hover {
        background-color: #0056b3;
      }

      .btn-secondary {
        border: 2px solid white;
        color: white;
      }

      .btn-secondary:hover {
        background-color: white;
        color: black;
      }

      /* Mobile Adjustments */
      @media (max-width: 768px) {
        .hero-content h1 {
          font-size: 2.5rem;
        }
        .cta-buttons {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="hero-content">
        <h1>Design Your Future</h1>
        <p>
          Build stunning digital experiences with a modern approach to web
          development. Simple, fast, and elegant.
        </p>
        <div class="cta-buttons">
          <a href="#" class="btn btn-primary">Get Started</a>
          <a href="#" class="btn btn-secondary">Learn More</a>
        </div>
      </div>
    </section>
  </body>
</html>
